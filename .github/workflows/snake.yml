name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: Nadav0077
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#8B5CF6&color_dots=#2DD4BF,#6D28D9,#0D9488,#A5B4FC,#A5B4FC

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
